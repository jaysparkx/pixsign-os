[build]
  command = "prisma generate && next build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Cache headers are managed by src/middleware.ts:
#   - HTML pages: Cache-Control: no-cache + Netlify-CDN-Cache-Control: no-store
#   - Static assets (_next/static): handled by Next.js with immutable hashes
